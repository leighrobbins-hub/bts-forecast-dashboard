# Publishes GitHub Pages site for the BTS Forecast dashboard (dashboard/ only).
# Gene Code Explorer + Nexus live in https://github.com/leighrobbins-hub/GeneCode-Explorer
name: Deploy dashboard site

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/deploy-dashboard-site.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-dashboard-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (BTS forecast app)
        run: |
          set -e
          mkdir -p _site
          cp dashboard/index.html dashboard/app.js dashboard/styles.css _site/
          if [ -f dashboard/data.json ]; then cp dashboard/data.json _site/; fi
          for f in dashboard/*.jpeg dashboard/*.jpg dashboard/*.png dashboard/*.csv; do
            [ -f "$f" ] && cp "$f" _site/ || true
          done

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
          force_orphan: false
