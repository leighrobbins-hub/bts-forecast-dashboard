# Publishes the static dashboard folder (Nexus, Gene Code, math, ELA) to GitHub Pages.
# Requires Pages → Source: branch gh-pages / (root) or legacy gh-pages workflow settings.
name: Deploy dashboard site

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/deploy-dashboard-site.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-dashboard-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          publish_branch: gh-pages
          force_orphan: false
