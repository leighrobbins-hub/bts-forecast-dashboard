name: Update BTS Forecast Dashboard

on:
  schedule:
    # Run daily at 6 AM UTC (1 AM CST) — Looker refreshes once per day
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [ main ]
    paths:
      - 'data/**'
      - 'scripts/**'
      - 'dashboard/index.html'
      - 'dashboard/app.js'
      - 'dashboard/styles.css'

permissions:
  contents: write
  pages: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          python -m unittest discover -s tests -v

      - name: Fetch Looker data
        env:
          LOOKER_CLIENT_ID: ${{ secrets.LOOKER_CLIENT_ID }}
          LOOKER_CLIENT_SECRET: ${{ secrets.LOOKER_CLIENT_SECRET }}
          LOOKER_BASE_URL: ${{ secrets.LOOKER_BASE_URL }}
          LOOKER_RUN_RATE_LOOK_ID: ${{ secrets.LOOKER_RUN_RATE_LOOK_ID }}
          LOOKER_UTILIZATION_LOOK_ID: ${{ secrets.LOOKER_UTILIZATION_LOOK_ID }}
          LOOKER_ACTUALS_LOOK_ID: ${{ secrets.LOOKER_ACTUALS_LOOK_ID }}
          LOOKER_NAT_P90_LOOK_ID: ${{ secrets.LOOKER_NAT_P90_LOOK_ID }}
        run: |
          python scripts/fetch_looker_data.py
        continue-on-error: true
      
      - name: Run analysis
        run: |
          python scripts/run_analysis.py
      
      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ dashboard/
          git diff --quiet && git diff --staged --quiet || git commit -m "[skip ci] Update dashboard data - $(date +'%Y-%m-%d')"
      
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
      # Pages deploy: workflow "Deploy dashboard site" (dashboard/ only; games are in nexus-academy repo)
