[build]
  publish = "dashboard"
  functions = "netlify/functions"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/data.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
